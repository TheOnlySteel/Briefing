name: Auto-create PR for claude branches

on:
  push:
    branches:
      - 'claude/**'

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Create PR if none exists
        run: |
          existing=$(gh pr list --repo "$GITHUB_REPOSITORY" --head "$GITHUB_REF_NAME" --state open --json number --jq '.[0].number')
          if [ -z "$existing" ]; then
            gh pr create \
              --repo "$GITHUB_REPOSITORY" \
              --head "$GITHUB_REF_NAME" \
              --base master \
              --title "$GITHUB_REF_NAME" \
              --body "Auto-created from branch \`$GITHUB_REF_NAME\`."
          else
            echo "PR #$existing already exists, skipping."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
